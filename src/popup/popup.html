<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoomiXcel</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <img src="../icon48.png" alt="BoomiXcel" class="popup-logo" />
      <h1>BoomiXcel</h1>
      <span class="version" id="versionLabel"></span>
    </header>

    <section class="toggle-list" id="toggleList">
      <p class="loading">Loading&hellip;</p>
    </section>

    <footer class="popup-footer">
      <button id="openOptions" class="btn-secondary">Full Settings</button>
      <button id="refreshPage" class="btn-secondary">Reload Page</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
